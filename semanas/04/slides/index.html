<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semana 04 — Fundamentos de Agentic AI y Claude Code</title>
  <link rel="stylesheet" href="../../../node_modules/reveal.js/dist/reveal.css">
  <link rel="stylesheet" href="../../../node_modules/reveal.js/dist/theme/black.css">
  <link rel="stylesheet" href="../../../node_modules/reveal.js/plugin/highlight/monokai.css">
  <link rel="stylesheet" href="../../../_config/theme/custom.css">
  <link rel="stylesheet" href="../../../_config/theme/components.css">
  <style>
    /* Safety net for dense slides: when a slide's content exceeds the
       canvas height, show a vertical scrollbar instead of clipping
       the bottom. Only kicks in when overflow is real. */
    .reveal .slides > section,
    .reveal .slides > section > section {
      overflow-y: auto;
      max-height: 100%;
    }
    /* Make all <pre>/<code> blocks respect their containing card.
       Reveal.js defaults: pre at width: 90%, and `pre code` with
       overflow: auto + word-wrap: normal — that forces a horizontal
       scrollbar instead of wrapping. We override both. */
    .reveal pre {
      width: 100% !important;
      max-width: 100% !important;
      box-sizing: border-box !important;
      white-space: pre-wrap !important;
      word-break: break-word !important;
      overflow-wrap: anywhere !important;
    }
    .reveal pre code {
      white-space: pre-wrap !important;
      word-break: break-word !important;
      overflow-wrap: anywhere !important;
      overflow: visible !important;
      max-height: none !important;
      display: block;
    }

    /* ------------------------------------------------------------------ */
    /* SHARED HELPER: .lens-tracker                                        */
    /* A thin horizontal bar with two poles: LOOP and CONTEXTO.           */
    /* Usage: add class .on-loop or .on-context to activate one pole.     */
    /* ------------------------------------------------------------------ */
    .lens-tracker {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      max-width: 720px;
      margin: 0 auto;
      gap: var(--spacing-md);
    }

    .lens-tracker .pole {
      font-family: var(--font-mono);
      font-size: 0.78rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border: 1px solid var(--text-muted);
      border-radius: 8px;
      padding: var(--spacing-xs) var(--spacing-sm);
      transition:
        color 0.3s ease,
        background 0.3s ease,
        border-color 0.3s ease,
        transform 0.3s ease,
        font-weight 0.3s ease;
    }

    .lens-tracker .lens-sep {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      flex-shrink: 0;
    }

    /* on-context: CONTEXTO pole lit, LOOP dimmed */
    .lens-tracker.on-context .pole-context {
      color: var(--bg-primary);
      background: var(--accent-secondary);
      border-color: var(--accent-secondary);
      transform: scale(1.05);
      font-weight: 700;
    }
    .lens-tracker.on-context .pole-loop {
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-color: var(--text-muted);
      transform: none;
      font-weight: normal;
    }

    /* on-loop: LOOP pole lit, CONTEXTO dimmed */
    .lens-tracker.on-loop .pole-loop {
      color: var(--bg-primary);
      background: var(--accent-secondary);
      border-color: var(--accent-secondary);
      transform: scale(1.05);
      font-weight: 700;
    }
    .lens-tracker.on-loop .pole-context {
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-color: var(--text-muted);
      transform: none;
      font-weight: normal;
    }

    /* ------------------------------------------------------------------ */
    /* SHARED HELPER: .tricotomia                                          */
    /* 3-row progressive-reveal table. Add .show-1/.show-2/.show-3.       */
    /* Columns: Rotulo | Mecanismo | Cuando paga contexto                  */
    /* ------------------------------------------------------------------ */
    .tricotomia {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1.4fr;
      gap: var(--spacing-sm);
      max-width: 860px;
      margin: 0 auto;
    }

    .tricotomia .tcell {
      padding: var(--spacing-xs) var(--spacing-sm);
      font-size: 0.88rem;
      color: var(--text-primary);
    }

    .tricotomia .tcell.thead {
      color: var(--text-muted);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--text-muted);
    }

    /* Default: all data rows dimmed */
    .tricotomia .trow-1,
    .tricotomia .trow-2,
    .tricotomia .trow-3 {
      display: contents; /* grid children must not be wrapped; cells are direct grid items */
    }

    .tricotomia .trow-1 .tcell,
    .tricotomia .trow-2 .tcell,
    .tricotomia .trow-3 .tcell {
      opacity: 0.25;
      transition: opacity 0.4s ease, background 0.4s ease;
      border-radius: 6px;
    }

    /* Lit row styling applied to each cell inside a lit row */
    .tricotomia .trow-1.lit .tcell,
    .tricotomia .trow-2.lit .tcell,
    .tricotomia .trow-3.lit .tcell {
      opacity: 1;
      background: var(--bg-secondary);
    }

    /* First cell of a lit row gets accent color and left border treatment */
    .tricotomia .trow-1.lit .tcell:first-child,
    .tricotomia .trow-2.lit .tcell:first-child,
    .tricotomia .trow-3.lit .tcell:first-child {
      color: var(--accent);
      border-left: 3px solid var(--accent-secondary);
      padding-left: calc(var(--spacing-sm) - 3px);
    }

    /* show-1: trow-1 rotulo at full strength, other cells in trow-1 dimmed;
               trow-2 and trow-3 stay at default (0.25) */
    .tricotomia.show-1 .trow-1 .tcell {
      opacity: 1;
      background: var(--bg-secondary);
    }
    .tricotomia.show-1 .trow-1 .tcell:first-child {
      color: var(--accent);
      border-left: 3px solid var(--accent-secondary);
      padding-left: calc(var(--spacing-sm) - 3px);
    }
    .tricotomia.show-1 .trow-1 .tcell:not(:first-child) {
      opacity: 0.3;
    }

    /* show-2: trow-1 and trow-2 fully lit; trow-3 stays dimmed */
    .tricotomia.show-2 .trow-1 .tcell,
    .tricotomia.show-2 .trow-2 .tcell {
      opacity: 1;
      background: var(--bg-secondary);
    }
    .tricotomia.show-2 .trow-1 .tcell:first-child,
    .tricotomia.show-2 .trow-2 .tcell:first-child {
      color: var(--accent);
      border-left: 3px solid var(--accent-secondary);
      padding-left: calc(var(--spacing-sm) - 3px);
    }

    /* show-3: all three rows fully lit */
    .tricotomia.show-3 .trow-1 .tcell,
    .tricotomia.show-3 .trow-2 .tcell,
    .tricotomia.show-3 .trow-3 .tcell {
      opacity: 1;
      background: var(--bg-secondary);
    }
    .tricotomia.show-3 .trow-1 .tcell:first-child,
    .tricotomia.show-3 .trow-2 .tcell:first-child,
    .tricotomia.show-3 .trow-3 .tcell:first-child {
      color: var(--accent);
      border-left: 3px solid var(--accent-secondary);
      padding-left: calc(var(--spacing-sm) - 3px);
    }
  </style>
</head>
